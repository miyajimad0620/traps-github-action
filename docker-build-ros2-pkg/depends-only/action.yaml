name: docker-build-ros2-pkg-depends-only
description: Build Docker Image for ROS2 package and push to ghcr.io

inputs:
  token:
    description: GitHub Token
    required: false
    default: ${{ github.token }}
  platforms:
    description: Docker Image platform (comma separation)
    required: false
    default: linux/amd64, linux/arm64/v8
  rosdistro:
    description: ROS distribution (lowercase)
    required: false
    default: humble

outputs:
  outputs:
  docker-tag:
    description: "Docker tag op depends-only image"
    value: ${{ steps.get-docker-tag.outputs.value }}

runs:
  using: composite
  steps:
  - name: Install rosdep & vcstool
    shell: bash
    run: |
      set -e
      sudo apt-get update
      sudo apt-get install -y python3-pip curl 
      sudo sh -c 'echo "deb http://packages.ros.org/ros/ubuntu $(lsb_release -sc) main" > /etc/apt/sources.list.d/ros-latest.list'
      curl -s https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc | sudo apt-key add -
      sudo apt-get update
      sudo apt-get install python3-vcstool
      pip3 install -u rosdep
  
  - name: Make temp dir
    id: make-temp-dir
    run: echo "path=$(mktemp -d ${{ github.workspace }}/tmp.XXXXXX)" >> $GITHUB_OUTPUT
    shell: bash
  
  - name: Make ros2 ws
    working-directory: ${{ steps.make-temp-dir.outputs.path }}
    shell: bash
    run: |
      set -e
      ROS_REPO_NAME=$(basename ${{ github.repository }})
      mkdir -p src/$ROS_REPO_NAME
      cd src/$ROS_REPO_NAME
      git init
      git remote add origin https://${{ inputs.token }}@github.com/${{ github.repository }}.git
      git fetch --depth 1 origin ${{ github.sha }}
      git checkout FETCH_HEAD

      cd ${{ steps.make-temp-dir.outputs.path }}
      for REPOS_FILE in src/$ROS_REPO_NAME/*.repos
      do
        if [ ! -f ${REPOS_FILE} ]; then continue; fi
        vcs import src < "${REPOS_FILE}"
      done
    
  - name: Get depends
    id: get-apt-depends
    working-directory: ${{ steps.make-temp-dir.outputs.path }}
    shell: bash
    run: |
      ROS_DEPENDS=($(rosdep keys --from-paths $HOME/traps_ws/src))
      APT_DEPENDS_STR="ros-humble-rmw-cyclonedds-cpp"
      ROSDEP_DB=("$(rosdep db)")
      for ROS_DEPEND in ${ROS_DEPENDS[@]}
      do
        APT_DEPENDS_STR+=$(printf "%s\n" "{ROSDEP_DB[@]}" | grep -w "$ROS_DEPEND ->" | sed "s/$ROS_DEPEND ->//")
      done
      echo "str=$APT_DEPENDS_STR" >> $GITHUB_OUTPUT
  
  - name: Login to GitHub Container Registry
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ inputs.token }}
      logout: false

  - name: Set up QEMU
    uses: docker/setup-qemu-action@v3
    with:
      platforms: ${{ inputs.platforms }}

  - name: Set up Docker Buildx
    id: set-docker-builder
    uses: docker/setup-buildx-action@v3
    with:
      platforms: ${{ inputs.platforms }}
  
  - name: Checkout
    uses: actions/checkout@v4
    with:
      token: ${{ inputs.token }}
      path: ${{ steps.make-temp-dir.outputs.path }}
      fetch-depth: 0

  - name: Extract metadata (tags, labels) for Docker (depends only)
    id: set-docker-metadata
    uses: docker/metadata-action@v5
    with:
      images: ghcr.io/${{ github.repository }}/depends_only

  - name: Build and push (depends only)
    uses: docker/build-push-action@v5
    with:
      context: ${{ github.action_path }}/depends-only
      file: ${{ github.action_path }}/depends-only/Dockerfile
      push: true
      tags: |
        ${{ steps.set-docker-metadata.outputs.tags }}
      labels: |
        ${{ steps.set-docker-metadata.outputs.labels }}
        ${{ steps.set-docker-metadata-sha.outputs.labels }}
      build-args: |
        ROS_DISTRO=${{ inputs.rosdistro }}
        APT_DEPENDS_STR=h${{ steps.get-apt-depends.outputs.str }}
      platforms: ${{ inputs.platforms }}
      builder: ${{ steps.set-docker-builder.outputs.name }}
      cache-from: type=gha
      cache-to: type=gha, mode=max

  - name: Get docker tag
    shell: bash
    run: |
      DOCKER_TAGS=("${{ steps.set-docker-metadata.outputs.tags }}")
      echo "value=${DOCKER_TAGS[0]}" >> $GITHUB_OUTPUT